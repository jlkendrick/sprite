name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Build
        run: |
          VERSION_CLEAN="${GITHUB_REF_NAME#v}"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSPRITE_VERSION="${VERSION_CLEAN}"
          cmake --build build --target sp-binary

      - name: Stage binary
        run: mv build/sp-binary sp-binary-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: sp-binary-arm64
          path: sp-binary-arm64

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        run: |
          gh release create ${{ github.ref_name }} \
            sp-binary-arm64 \
            --generate-notes \
            --title "Sprite ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ github.ref_name }}
          SHA=$(curl -sL "https://github.com/jlkendrick/sprite/archive/refs/tags/${VERSION}.tar.gz" | shasum -a 256 | awk '{print $1}')

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/jlkendrick/homebrew-tap.git tap
          mkdir -p tap/Formula

          cat > tap/Formula/sprite.rb << FORMULA
          class Sprite < Formula
            desc "Intelligent directory navigation and command augmentation tool for Zsh"
            homepage "https://github.com/jlkendrick/sprite"
            url "https://github.com/jlkendrick/sprite/archive/refs/tags/${VERSION}.tar.gz"
            sha256 "${SHA}"
            license "MIT"

            depends_on "cmake" => :build
            depends_on :macos

            def install
              system "cmake", "-S", ".", "-B", "build",
                     "-DCMAKE_BUILD_TYPE=Release",
                     "-DSPRITE_VERSION=#{version}",
                     *std_cmake_args
              system "cmake", "--build", "build", "--target", "sp-binary"
              bin.install "build/sp-binary"
              zsh_completion.install "docs/scripts/_sp"
              etc.install "docs/scripts/sprite.zsh"
            end

            def caveats
              <<~EOS
                Run the following to finish setup:

                  sp-binary init

                Then reload your shell:

                  source ~/.zshrc
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/sp-binary --version")
            end
          end
          FORMULA

          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/sprite.rb
          git diff --staged --quiet && echo "Formula already up to date" && exit 0
          git commit -m "sprite ${VERSION}"
          git push
